<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Realtime Chat</title>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<!-- 🔔 Notification Bell -->
<div style="position: fixed; top: 20px; right: 30px;">
    <button onclick="toggleNotifications()" style="font-size: 22px;">
        🔔
        <span id="notif-count"
              style="background:red;color:white;border-radius:50%;
                     padding:2px 6px; display:none;">0</span>
    </button>

    <div id="notif-dropdown"
         style="display:none; position:absolute; right:0;
                background:#fff; border:1px solid #ccc;
                width:250px; max-height:300px; overflow:auto;">
        <ul id="notif-list" style="list-style:none; padding:10px;"></ul>
    </div>
</div>

<h2>Realtime Chat Application</h2>

<input type="text" id="receiver" placeholder="Send private message to…" />

<input type="text" id="message" placeholder="Type a message" />

<button onclick="sendMessage()">Send</button>
<button onclick="sendPrivate()">Send Private</button>


<ul id="messages"></ul>

<script>
    let stompClient = null;
    let notifications = [];
    let unreadCount = 0;
    let activeChatUser = null;

    async function loadUnreadNotifications() {
        const res = await fetch("/api/notify/unread");
        notifications = await res.json();
        unreadCount = notifications.length;
        updateBell();
        renderNotifications();
    }

    async function loadPrivateChat(user) {
        if (activeChatUser === user) return; // avoid reload

        activeChatUser = user;

        const res = await fetch(`/api/private/history/${user}`);
        const messages = await res.json();

        const list = document.getElementById("messages");
        list.innerHTML = "";

        messages.forEach(m => {
            appendMessage(m.sender + " (private): " + m.content, true);
        });
    }

    function updateBell() {
        const badge = document.getElementById("notif-count");
        badge.style.display = unreadCount > 0 ? "inline" : "none";
        badge.innerText = unreadCount;
    }

    function toggleNotifications() {
        const dropdown = document.getElementById("notif-dropdown");
        dropdown.style.display =
            dropdown.style.display === "none" ? "block" : "none";
    }

    function renderNotifications() {
        const list = document.getElementById("notif-list");
        list.innerHTML = "";

        notifications.forEach(n => {
            const li = document.createElement("li");
            li.innerText = n.message;
            li.style.cursor = "pointer";

            li.onclick = async () => {
                await fetch(`/api/notify/read/${n.id}`, { method: "POST" });

                // extract username from notification text
                const sender = n.message.replace("Private message from ", "");

                document.getElementById("receiver").value = sender;
                await loadPrivateChat(sender);

                notifications = notifications.filter(x => x.id !== n.id);
                unreadCount--;
                updateBell();
                renderNotifications();
            };

            list.appendChild(li);
        });
    }

    async function connect() {
        await loadUnreadNotifications();

        const receiver = document.getElementById("receiver").value;
        if (receiver) {
            await loadPrivateChat(receiver);
        }

        const socket = new SockJS('/ws');
        stompClient = Stomp.over(socket);

        stompClient.connect({}, () => {

            stompClient.subscribe('/topic/messages', msg => {
                const m = JSON.parse(msg.body);
                const li = document.createElement("li");
                li.innerText = m.sender + ": " + m.content;
                document.getElementById("messages").appendChild(li);
            });

            stompClient.subscribe('/user/queue/notifications', msg => {
                const n = JSON.parse(msg.body);
                notifications.unshift(n);
                unreadCount++;
                updateBell();
                renderNotifications();
            });
            stompClient.subscribe('/user/queue/private', msg => {
                const m = JSON.parse(msg.body);
                const currentChat = document.getElementById("receiver").value;

                if (currentChat === m.sender) {
                    appendMessage(m.sender + " (private): " + m.content, true);
                    return;
                }

                notifications.unshift({
                    id: m.id ?? Date.now(),
                    message: "Private message from " + m.sender
                });

                unreadCount++;
                updateBell();
                renderNotifications();
            });

        });
    }

    function sendMessage() {
        const content = document.getElementById("message").value;

        fetch("/chat/send", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "content=" + encodeURIComponent(content)
        });

        document.getElementById("message").value = "";
    }
    function loadMessages() {
        fetch("/chat/messages")
            .then(res => res.json())
            .then(messages => {
                const list = document.getElementById("messages");
                list.innerHTML = ""; // clear UI

                messages.forEach(msg => {
                    const li = document.createElement("li");
                    li.innerText = msg.sender + ": " + msg.content;
                    list.appendChild(li);
                });
            })
            .catch(err => console.error("Messages load failed", err));
    }

    function sendPrivate() {
        const receiver = document.getElementById("receiver").value;
        const content = document.getElementById("message").value;

        fetch("/api/private/send", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: `receiver=${receiver}&content=${encodeURIComponent(content)}`
        });

        appendMessage("me (private): " + content, true);
        document.getElementById("message").value = "";
    }

    function appendMessage(text, isPrivate = false) {
        const li = document.createElement("li");
        li.innerText = isPrivate ? "🔒 " + text : text;
        document.getElementById("messages").appendChild(li);
    }


    connect();
    loadMessages(); //load message on refresh
</script>

</body>
</html>
